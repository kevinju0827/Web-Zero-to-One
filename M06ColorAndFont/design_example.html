<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M06 Color and Font Practice</title>
</head>
<body>

  <h1 style="color: teal;">My Styling Playground</h1>

  <p style="color: rgba(128, 0, 128, 0.5);">This text is semi-transparent purple.</p>

  <h2 style="font-size: 36px;">This heading is 36px large</h2>

  <p style="color: red; font-size: 18px; font-family: Arial, Helvetica, sans-serif;">
    This paragraph has multiple styles applied: it is red, 18px large, and uses the Arial font.
  </p>

</body>
</html>
