<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Homepage</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      color: #334155;
    }

    ul {
      background-color: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
      line-height: 4;
    }
    li {
      display: inline-block;
      width: 100px;
    }
    li a {
      color: #64748b;
      text-decoration: none;
      font-weight: bold;
    }

    .action-btn {
      display: inline-block;
      width: 240px;
      background-color: black;
      color: white;
      line-height: 3;
      text-decoration: none;
      border-radius: 10px;
    }

    .highlight {
      background-color: #dbeafe;
      color: #1d4ed8;
    }

    #secret {
      display: none;
    }
  </style>
</head>
<body>
  <ul>
    <li><a href="#">Products</a></li>
    <li><a href="#">Solutions</a></li>
    <li><a href="#">Pricing</a></li>
  </ul>
  <img src="logo.svg" alt="Logo" width="500">
  <h1>Build the Future with Us</h1>
  <p>Join thousands of developers on an <strong class="highlight">innovative platform</strong> designed for scale.</p>

  <br>
  <a href="#" class="action-btn">Get Started for Free</a>

  <p id="secret">Special discount code: MYCOUPON</p>

</body>
</html>
