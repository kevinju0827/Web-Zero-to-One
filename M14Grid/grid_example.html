<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Masterclass</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background-color: #f8fafc;
            padding: 40px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 { text-align: center; color: #1e293b; margin-bottom: 40px; }

        /* The Grid Layout */
        .grid-layout {
            display: grid;
            /* 3 equal columns */
            grid-template-columns: repeat(3, 1fr);
            /* Automatic row heights */
            grid-template-rows: auto;
            gap: 24px;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #475569;
            min-height: 150px;
        }

        /* Span multiple columns */
        .header {
            grid-column: span 3;
            background: #4f46e5;
            color: white;
            font-size: 1.5rem;
        }

        /* Span multiple rows */
        .sidebar {
            grid-row: span 2;
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            box-shadow: none;
        }

        /* Large feature area */
        .feature {
            grid-column: span 2;
            background-color: #fef3c7;
            color: #92400e;
        }

        .footer {
            grid-column: span 3;
            background: #1e293b;
            color: white;
            min-height: 80px;
        }

        @media (max-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr; /* Stack on mobile */
            }
            .header, .sidebar, .feature, .footer {
                grid-column: span 1;
                grid-row: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>M14 CSS Grid Demo</h1>

        <div class="grid-layout">
            <div class="box header">Main Header (span 3 cols)</div>
            <div class="box sidebar">Sidebar (span 2 rows)</div>
            <div class="box feature">Featured Content (span 2 cols)</div>
            <div class="box">Regular Box 1</div>
            <div class="box">Regular Box 2</div>
            <div class="box footer">Footer (span 3 cols)</div>
        </div>
    </div>

</body>
</html>
