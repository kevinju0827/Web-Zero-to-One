<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M07 CSS Basic Practice</title>

  <style>
    li {
      font-size: 18px;
    }

    .alert {
      color: red;
    }

    #hero-text {
      color: purple;
    }
  </style>
</head>
<body>

  <h1 id="hero-text">Welcome to My Styling Page</h1>

  <p class="alert">This is an important alert message!</p>
  <p>This is just a normal, everyday paragraph.</p>

  <ul>
    <li>First item in the list</li>
    <li>Second item in the list</li>
    <li>Third item in the list</li>
  </ul>

</body>
</html>
